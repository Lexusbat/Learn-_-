<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Basics</title>
</head>
<body>
    <h2>Welcome to HTML Basic</h2>
    <h3>Please enter the following</h3>
    <form>
        <div>
            <label1>First Name</label1> 
            <p>
            <input type="text" />   <!-- Normal textbox-->
            </p>
        </div>
         <div>
            <label1>Email address</label1>
            <p>
            <input type="email" />  <!-- eEmail referral->
            </p>
        </div>
        <div>
            <label1>Password</label1>
            <p>
            <input type="password" />  <!-- Bullet display -->
            </p>
        </div>
         <div>
            <label1>Date</label1>
            <p>
            <input type="date" /> <!-- Date calender pop-up->
            </p>
        </div>
         <div>
            <label1>Number</label1>
            <p>
            <input type="number" />  <!-- Like a scrollbar -->
            </p>
        </div>
        <p>
        <button>Submit</button>
        </p>


    </form>








</body>
</html>
